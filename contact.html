<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | GVM Upgrades Australia</title>
    <link rel="icon" type="image/svg+xml" href="/public/favicon.svg">
    <style>
        @font-face {
            font-family: 'DIN Condensed Bold';
            src: url('/public/fonts/DIN Condensed Bold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Arial';
            src: url('/public/fonts/Arial.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --yellow: #E7E515;
            --white: #FFFFFF;
            --navy: #1A1348;
            --cream: #F3EBD9;
            --navy-light: rgba(26, 19, 72, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--cream);
            color: var(--navy);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 1rem 2rem;
            background-color: var(--navy);
        }

        .header-inner {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            text-decoration: none;
        }

        .logo img {
            height: 40px;
        }

        .contact-btn {
            background-color: var(--yellow);
            color: var(--navy);
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(231, 229, 21, 0.4);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 3rem 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .page-title {
            font-family: 'DIN Condensed Bold', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--navy);
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            text-align: center;
            color: rgba(26, 19, 72, 0.7);
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }

        /* Form */
        .contact-form {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(26, 19, 72, 0.08);
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 16px 18px;
            font-size: 16px;
            font-family: 'Arial', sans-serif;
            border: 2px solid rgba(26, 19, 72, 0.1);
            border-radius: 12px;
            background: var(--white);
            color: var(--navy);
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: var(--navy);
            box-shadow: 0 0 0 4px rgba(26, 19, 72, 0.1);
            outline: none;
        }

        .form-input::placeholder {
            color: rgba(26, 19, 72, 0.4);
        }

        textarea.form-input {
            min-height: 150px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--yellow);
            color: var(--navy);
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Arial', sans-serif;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(231, 229, 21, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Back Link */
        .back-link-wrapper {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: rgba(26, 19, 72, 0.5);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--navy);
        }

        .back-link svg {
            width: 18px;
            height: 18px;
        }

        /* Footer */
        .footer {
            background-color: var(--navy);
            padding: 2rem;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--white);
        }

        .footer-copyright {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            margin-top: 1rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header {
                padding: 1rem;
            }

            .main-content {
                padding: 2rem 1rem;
            }

            .contact-form {
                padding: 1.5rem;
            }

            .page-title {
                font-size: 2rem;
            }

            .footer-links {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo">
                <img src="/public/GVMLogo.svg" alt="GVM Upgrades Australia" height="40">
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <h1 class="page-title">Contact Us</h1>
            <p class="page-subtitle">Have a question? We're here to help.</p>

            <form class="contact-form" action="thanks.html" method="GET">
                <div class="form-group">
                    <label class="form-label" for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" class="form-input" placeholder="Enter your first name" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email address" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="form-input" placeholder="Enter your phone number" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="message">What's your question or how can we help?</label>
                    <textarea id="message" name="message" class="form-input" placeholder="Tell us how we can assist you..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Submit</button>
            </form>

            <div class="back-link-wrapper">
                <a href="/" class="back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Back to Home
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-links">
            <a href="/privacy">Privacy Policy</a>
            <a href="/terms">Terms & Conditions</a>
            <a href="/faq">FAQ</a>
        </div>
        <p class="footer-copyright">&copy; 2024 GVM Upgrades Australia. All rights reserved.</p>
    </footer>
</body>
</html>
