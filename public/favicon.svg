<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1348"/>
      <stop offset="100%" style="stop-color:#2A2068"/>
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0ED2A"/>
      <stop offset="100%" style="stop-color:#E7E515"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Subtle corner accent -->
  <path d="M512 160 L512 0 L352 0 Q512 0 512 160" fill="#E7E515" opacity="0.15"/>

  <!-- GVM Text - DIN Condensed Bold style -->
  <text x="256" y="340"
        font-family="DIN Condensed, Arial Black, sans-serif"
        font-weight="700"
        font-size="260"
        fill="url(#yellowGrad)"
        text-anchor="middle"
        letter-spacing="-8"
        filter="url(#glow)">GVM</text>

  <!-- Underline accent -->
  <rect x="80" y="380" width="352" height="12" rx="6" fill="#E7E515"/>
</svg>
